/* ---------- date helpers ---------- */
const pad = n => String(n).padStart(2,"0");
const keyOf = dt => `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;

function monthDates(year, m0) {
  const dates=[], last=new Date(year,m0+1,0).getDate();
  for(let d=1;d<=last;d++) dates.push(new Date(year,m0,d));
  return dates;
}
function monthCells(year, m0) {
  const first=new Date(year,m0,1);
  const offset=(first.getDay()+6)%7;
  const start=new Date(year,m0,1-offset);
  const cells=[];
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);cells.push(d);}
  while(cells.length>=7){
    const last7=cells.slice(cells.length-7);
    if(last7.every(d=>d.getMonth()!==m0))cells.splice(cells.length-7,7);else break;
  }
  return cells;
}
function weekStart(dt){
  const off=(dt.getDay()+6)%7;const s=new Date(dt);s.setDate(dt.getDate()-off);s.setHours(0,0,0,0);return s;
}

/* ================================================================

  "2027-01-01":"신정",
  "2027-02-05":"설날 전날","2027-02-08":"설날 대체","2027-02-09":"설날 다음날 대체",
  "2027-03-01":"삼일절",
  "2027-05-03":"노동절 대체","2027-05-05":"어린이날","2027-05-13":"부처님오신날",

/* 병원 휴무일: 추석 당일, 설날 당일, 크리스마스, 신정 (매년 고정) */
const CLINIC_CLOSED = {
  "추석":true, "설날":true, "크리스마스":true, "신정":true,
  "크리스마스 대체":true, // 크리스마스가 토/일이면 대체일도 휴무
};

/* 해당 연월의 법정 공휴일 날짜 목록 반환 */
function getKrHolidaysForMonth(year, m0) {
  const prefix = year + "-" + String(m0+1).padStart(2,"0");
  return Object.keys(KR_HOLIDAYS).filter(k=>k.startsWith(prefix));
}

function autoSchedule(doctors, constraints, year, m0, holidays=[], leaves=[]) {
  // 1일이 포함된 주의 월요일부터 4주(28일) 배정
  const firstDay = new Date(year, m0, 1);
  const dayOfWeek = firstDay.getDay();
  const offsetToMon = dayOfWeek === 0 ? 1 : dayOfWeek === 1 ? 0 : -(dayOfWeek - 1);
  const firstMon = new Date(firstDay);
  firstMon.setDate(firstDay.getDate() + offsetToMon);

  const dates = [];
  for(let i=0; i<35; i++){
    const d = new Date(firstMon);
    d.setDate(firstMon.getDate() + i);
    dates.push(d);
  }
  const weekIdxOf = dt => Math.floor((dt.getTime() - firstMon.getTime()) / (7*24*3600*1000));

  // 법정 공휴일 + 사용자 지정 공휴일 합산
  // KR_HOLIDAYS는 이미 평일 공휴일만 포함 (토요일 제외됨)
  // 사용자 추가 공휴일도 토요일/일요일은 제외
  const krHols = getKrHolidaysForMonth(year, m0);
  const holidaySet = new Set(
    [...krHols, ...holidays].filter(k => {
      const wd = new Date(k).getDay();
      return wd !== 0 && wd !== 6; // 평일 공휴일만
    })
  );

  // slotFixed 맵
  const slotFixedMap = {};
  doctors.forEach(d=>{ if(d.slotFixed) slotFixedMap[d.name]=d.slotFixed; });

  // 주차별 잔여 카운터
  const weekRemaining = {};
  doctors.forEach(d=>{
    const fixed = slotFixedMap[d.name];
    weekRemaining[d.name] = Array.from({length:5}, () => ({
      am:  fixed === "pm" ? 0 : d.weeklySlots,
      pm:  fixed === "am" ? 0 : d.weeklySlots,
      _weeklyBudget: d.weeklySlots,
      _used: 0,
    }));
  });

  // 토요일 월간 카운터 (공휴일과 별도 관리)
  const satRemaining = {};
  const holRemaining = {}; // 공휴일은 별도 카운터 — 무제한 (2명만 채우면 됨)
  doctors.forEach(d=>{
    satRemaining[d.name] = d.monthlySats;
    holRemaining[d.name] = 99; // 공휴일은 횟수 제한 없음, 2명 채우기만
  });

  // 제약 인덱싱
  const mustWork = {};
  const banned  = {};
  const noSplit = new Set();

  constraints.forEach(c=>{
    if(c.type==="no_split"){ noSplit.add(c.doctor); return; }
    if(c.type==="work_weekday"||c.type==="work_date"){
      const applyDates = c.type==="work_weekday"
        ? dates.filter(d=>String(d.getDay())===String(c.weekday))
        : dates.filter(d=>keyOf(d)===c.date);
      applyDates.forEach(dt=>{
        const k=keyOf(dt);
        if(!mustWork[k]) mustWork[k]={};
        const defaultSlots = dt.getDay()===6?["sat"]:["am","pm"];
        const slotsToApply = (c.slots&&c.slots.length) ? c.slots : defaultSlots;
        slotsToApply.forEach(s=>{
          if(!mustWork[k][s]) mustWork[k][s]=[];
          if(!mustWork[k][s].includes(c.doctor)) mustWork[k][s].push(c.doctor);
        });
      });
    } else {
      const applyDates = c.type==="off_weekday"
        ? dates.filter(d=>String(d.getDay())===String(c.weekday))
        : dates.filter(d=>keyOf(d)===c.date);
      applyDates.forEach(dt=>{
        const k=keyOf(dt);
        if(!banned[k]) banned[k]=new Set();
        banned[k].add(c.doctor);
      });
    }
  });

  // 연차 처리: banned 초기화 후 해당 기간 해당 의사를 banned에 추가
  leaves.forEach(lv=>{
    const start = new Date(lv.startDate);
    const end   = new Date(lv.endDate);
    dates.forEach(dt=>{
      if(dt >= start && dt <= end){
        const k = keyOf(dt);
        if(!banned[k]) banned[k] = new Set();
        banned[k].add(lv.doctor);
      }
    });
  });

  function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function canAssignWeekday(name, slot, wIdx){
    const w = weekRemaining[name][wIdx];
    if(!w) return false;
    if(slotFixedMap[name] && slotFixedMap[name] !== slot) return false;
    if(w[slot] <= 0) return false;
    if(w._used >= w._weeklyBudget) return false;
    return true;
  }

  function useWeekday(name, slot, wIdx){
    const w = weekRemaining[name][wIdx];
    if(!w) return;
    w[slot] = Math.max(0, w[slot] - 1);
    w._used++;
  }

  // 공통 2명 채우기 함수 (토요일/공휴일용)
  function assignTwoFromPool(dt, remMap, bannedSet, must){
    const chosen = [...must];
    if(chosen.length>=2) return chosen.slice(0,2);

    const available = doctors.filter(d=>{
      if(bannedSet.has(d.name)) return false;
      if(chosen.includes(d.name)) return false;
      return (remMap[d.name]||0) > 0;
    }).sort((a,b)=>(remMap[b.name]||0)-(remMap[a.name]||0));

    const topScore = remMap[available[0]?.name] ?? 0;
    const topGroup = available.filter(d=>(remMap[d.name]||0)===topScore);
    const rest = shuffle(topGroup).concat(available.filter(d=>(remMap[d.name]||0)<topScore));
    for(const d of rest){ if(chosen.length>=2) break; chosen.push(d.name); }

    // 부족하면 전체에서 채움 (1번 의사 우선)
    if(chosen.length < 2){
      const fb = [doctors[0], ...doctors.slice(1)].filter(Boolean);
      for(const d of fb){
        if(chosen.length>=2) break;
        if(!bannedSet.has(d.name) && !chosen.includes(d.name)) chosen.push(d.name);
      }
    }
    return chosen;
  }

  function assignSlot(dt, slot, alreadyAssigned=[]) {
    const k = keyOf(dt);
    const isSat = slot === "sat";
    const wIdx = weekIdxOf(dt);
    const must = ((mustWork[k]&&mustWork[k][slot]) ? [...mustWork[k][slot]] : [])
      .filter(n => isSat || !slotFixedMap[n] || slotFixedMap[n]===slot);
    const bannedSet = banned[k] || new Set();

    if(isSat){
      return assignTwoFromPool(dt, satRemaining, bannedSet, must);
    } else {
      // 평일: 주차별 잔여 기준
      const available = doctors.filter(d=>{
        if(bannedSet.has(d.name)) return false;
        if(must.includes(d.name)) return false;
        if(noSplit.has(d.name) && alreadyAssigned.includes(d.name)) return false;
        return canAssignWeekday(d.name, slot, wIdx);
      }).sort((a,b)=>{
        const ra = weekRemaining[a.name][wIdx]._weeklyBudget - weekRemaining[a.name][wIdx]._used;
        const rb = weekRemaining[b.name][wIdx]._weeklyBudget - weekRemaining[b.name][wIdx]._used;
        return rb - ra;
      });

      const chosen = [...must];
      if(chosen.length>=2) return chosen.slice(0,2);

      const getRemBudget = d => weekRemaining[d.name][wIdx]._weeklyBudget - weekRemaining[d.name][wIdx]._used;
      const topScore = available[0] ? getRemBudget(available[0]) : 0;
      const topGroup = available.filter(d=>getRemBudget(d)===topScore);
      const rest = shuffle(topGroup).concat(available.filter(d=>getRemBudget(d)<topScore));
      for(const d of rest){ if(chosen.length>=2) break; chosen.push(d.name); }

      // overflow: slotFixed 없는 의사만 주당 한도 초과 허용
      if(chosen.length < 2){
        const overflow = doctors.filter(d=>{
          if(bannedSet.has(d.name)||chosen.includes(d.name)) return false;
          if(noSplit.has(d.name) && alreadyAssigned.includes(d.name)) return false;
          if(slotFixedMap[d.name] && slotFixedMap[d.name]!==slot) return false;
          if(slotFixedMap[d.name]) return false;
          return true;
        });
        for(const d of overflow){ if(chosen.length>=2) break; chosen.push(d.name); }
      }
      return chosen;
    }
  }

  const schedule = {};
  dates.forEach(dt=>{
    const k=keyOf(dt), wd=dt.getDay();
    if(wd===0){ schedule[k]={closed:true}; return; }
    const wIdx = weekIdxOf(dt);

    // 병원 휴무일: 추석 당일, 설날 당일, 크리스마스, 신정
    const holidayName = KR_HOLIDAYS[k];
    if(holidayName && CLINIC_CLOSED[holidayName]){
      schedule[k]={closed:true, clinicClosed:true};
      return;
    }

    // 평일 공휴일: 횟수 제한 없이 2명 배정 (holRemaining 사용)
    if(holidaySet.has(k)){
      const bannedSet = banned[k] || new Set();
      const must = (mustWork[k]&&mustWork[k]["sat"]) ? [...mustWork[k]["sat"]] : [];
      const names = assignTwoFromPool(dt, holRemaining, bannedSet, must);
      // holRemaining은 줄이지 않음 (무제한)
      schedule[k]={sat:names, holiday:true};
      return;
    }

    if(wd===6){
      const names=assignSlot(dt,"sat",[]);
      names.forEach(n=>{ satRemaining[n]=Math.max(0,satRemaining[n]-1); });
      schedule[k]={sat:names};
    } else {
      const am=assignSlot(dt,"am",[]);
      am.forEach(n=>useWeekday(n,"am",wIdx));
      const pm=assignSlot(dt,"pm",am);
      pm.forEach(n=>useWeekday(n,"pm",wIdx));
      schedule[k]={am,pm};
    }
  });

  return schedule;
}

  ]);
  const [editingDocId, setEditingDocId] = useState(null);
  const [editingDocName, setEditingDocName] = useState("");
  const editNameRef = useRef(null);

  const [constraints, setConstraints] = useState([
    { id:"c1", doctor:"연현경", type:"no_split", slots:[] },
    { id:"c2", doctor:"동수련", type:"no_split", slots:[] },
  ]);
  const [showConst, setShowConst] = useState(false);
  const [editConst, setEditConst] = useState(null);

  const [year,  setYear]  = useState(2026);
  const [month, setMonth] = useState(5);
  const [holidays, setHolidays] = useState([]); // 사용자 추가 공휴일 (법정 공휴일은 자동 반영)
  const [newHoliday, setNewHoliday] = useState("");
  // 연차: [{id, doctor, startDate, endDate}]
  const [leaves, setLeaves] = useState([]);
  const [newLeaveDoctor, setNewLeaveDoctor] = useState("");
  const [newLeaveStart, setNewLeaveStart] = useState("");
  const [newLeaveEnd, setNewLeaveEnd] = useState("");
  const [schedule, setSchedule] = useState({});
  const [view, setView]     = useState("month");
  const [anchor, setAnchor] = useState(new Date(2026,5,1));
  const [editDate, setEditDate] = useState(null);
  const [lockedDates, setLockedDates] = useState(new Set()); // 잠긴 날짜 키 Set
  const toggleLock = (dt) => {
    const k = keyOf(dt);
    setLockedDates(prev => {
      const next = new Set(prev);
      if(next.has(k)) next.delete(k); else next.add(k);
      return next;
    });
  };

  const [newName, setNewName] = useState("");
  const [newWS,   setNewWS]   = useState(4);
  const [newSat,  setNewSat]  = useState(1);

  const docByName = useMemo(()=>{
    const m={}; doctors.forEach(d=>m[d.name]=d); return m;
  },[doctors]);

  const counts = useMemo(()=>{
    const c={}; doctors.forEach(d=>c[d.name]={am:0,pm:0,sat:0,hol:0,total:0});
    Object.entries(schedule).forEach(([,e])=>{
      if(e.holiday){
        // 공휴일: sat 슬롯이지만 hol로 별도 카운트
        (e["sat"]||[]).forEach(n=>{ if(c[n]){c[n].hol++;c[n].total++;} });
      } else {
        ["am","pm","sat"].forEach(s=>(e[s]||[]).forEach(n=>{
          if(c[n]){c[n][s]++;c[n].total++;}
        }));
      }
    });
    return c;
  },[schedule,doctors]);

  /* ---------- generate ---------- */
  function generate() {
    setScreen("generating");
    setTimeout(()=>{
      const result = autoSchedule(doctors, constraints, year, month, holidays, leaves);
      // 잠긴 날짜는 기존 배정 유지
      setSchedule(prev => {
        const merged = {...result};
        lockedDates.forEach(k => {
          if(prev[k] !== undefined) merged[k] = prev[k];
        });
        return merged;
      });
      setAnchor(new Date(year,month,1));
      setScreen("calendar");
    }, 60);
  }

  /* ---------- doctor name edit ---------- */
  function startEditName(d){
    setEditingDocId(d.id);
    setEditingDocName(d.name);
    setTimeout(()=>editNameRef.current?.focus(),50);
  }
  function commitEditName(id){
    const newN=editingDocName.trim();
    if(!newN||doctors.some(d=>d.id!==id&&d.name===newN)){ setEditingDocId(null); return; }
    const oldName=doctors.find(d=>d.id===id)?.name;
    setDoctors(prev=>prev.map(d=>d.id===id?{...d,name:newN}:d));
    // update schedule references
    setSchedule(prev=>{
      const next={};
      Object.entries(prev).forEach(([k,e])=>{
        const ne={...e};
        ["am","pm","sat"].forEach(s=>{
          if(ne[s]) ne[s]=ne[s].map(n=>n===oldName?newN:n);
        });
        next[k]=ne;
      });
      return next;
    });
    // update constraints
    setConstraints(prev=>prev.map(c=>c.doctor===oldName?{...c,doctor:newN}:c));
    setEditingDocId(null);
  }

  /* ---------- manual edit ---------- */
  const toggleDoctor=useCallback((dt,slot,name)=>{
    setSchedule(prev=>{
      const k=keyOf(dt),cur=prev[k]||{};
      if(cur.closed) return prev;
      const arr=cur[slot]?[...cur[slot]]:[];
      const i=arr.indexOf(name);
      if(i>=0)arr.splice(i,1);else arr.push(name);
      return {...prev,[k]:{...cur,[slot]:arr}};
    });
  },[]);
  const setClosed=useCallback((dt,val)=>{
    setSchedule(prev=>{
      const k=keyOf(dt);
      if(val) return {...prev,[k]:{closed:true}};
      return {...prev,[k]:dt.getDay()===6?{sat:[]}:{am:[],pm:[]}};
    });
  },[]);

  /* ---------- constraints ---------- */
  function openNewConst(){
    setEditConst({id:null,doctor:doctors[0]?.name||"",type:"off_weekday",weekday:"1",date:"",slots:[]});
    setShowConst(true);
  }
  function saveConst(){
    if(!editConst.doctor||!editConst.type) return;
    if((editConst.type==="work_weekday"||editConst.type==="off_weekday")&&editConst.weekday==="") return;
    if((editConst.type==="work_date"||editConst.type==="off_date")&&!editConst.date) return;
    setConstraints(prev=>{
      if(editConst.id) return prev.map(c=>c.id===editConst.id?{...editConst}:c);
      return [...prev,{...editConst,id:Date.now().toString()}];
    });
    setShowConst(false);setEditConst(null);
  }
  function removeConst(id){setConstraints(prev=>prev.filter(c=>c.id!==id));}
  function constLabel(c){
    if(c.type==="no_split") return `${c.doctor} · 오전·오후 연속 근무 금지`;
    const tag=c.type.startsWith("work")?"고정 근무":"고정 휴무";
    const slots=c.slots&&c.slots.length?` (${c.slots.map(s=>SLOT_TAG[s]).join("·")})`:""
    if(c.type==="work_weekday"||c.type==="off_weekday")
      return `${c.doctor} · ${WD_FULL[c.weekday]}마다 ${tag}${slots}`;
    return `${c.doctor} · ${c.date} ${tag}${slots}`;
  }
  function constTag(c){
    if(c.type==="no_split") return "nosplit";
    return c.type.startsWith("work")?"work":"off";
  }

  /* ---------- export ---------- */
  function exportCSV(){
    const rows=[["날짜","요일","시간대","진료시간","의사"]];
    monthDates(year,month).forEach(dt=>{
      const e=schedule[keyOf(dt)]||{};
      const label=`${dt.getMonth()+1}/${dt.getDate()}`,wd=WD_KR[dt.getDay()];
      if(e.closed){rows.push([label,wd,"-","-","휴무"]);return;}
      ["am","pm","sat"].forEach(s=>{
        if(e[s]) rows.push([label,wd,SLOT_TAG[s],SLOT_TIME[s],e[s].join(" / ")]);
      });
    });
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download=`시간표_${year}_${pad(month+1)}.csv`;a.click();URL.revokeObjectURL(url);
  }

  // ===== 저장 / 불러오기 =====
  function saveProject(){
    const data = {
      version: 1,
      savedAt: new Date().toISOString(),
      year, month,
      doctors, constraints, holidays, leaves,
      schedule,
      lockedDates: [...lockedDates],
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const dateStr = `${year}${pad(month+1)}`;
    a.download = `시간표_${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadProject(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.version || !data.schedule) throw new Error("올바른 시간표 파일이 아니에요");
        if(data.doctors) setDoctors(data.doctors);
        if(data.constraints) setConstraints(data.constraints);
        if(data.holidays) setHolidays(data.holidays);
        if(data.leaves) setLeaves(data.leaves);
        if(data.schedule) setSchedule(data.schedule);
        if(typeof data.year==="number") setYear(data.year);
        if(typeof data.month==="number") setMonth(data.month);
        if(data.lockedDates) setLockedDates(new Set(data.lockedDates));
        setAnchor(new Date(data.year ?? year, data.month ?? month, 1));
        setScreen("calendar");
        setLoadError("");
      } catch(e){
        setLoadError(e.message || "파일을 불러오는 데 실패했어요");
      }
    };
    reader.readAsText(file);
  }

  // 앱 시작 시 복원
  useEffect(()=>{
    try {
      const saved = localStorage.getItem(LS_KEY);
      if(!saved) return;
      const data = JSON.parse(saved);
      if(!data.version) return;
      if(data.doctors) setDoctors(data.doctors);
      if(data.constraints) setConstraints(data.constraints);
      if(data.holidays) setHolidays(data.holidays);
      if(data.leaves) setLeaves(data.leaves);
      if(data.schedule && Object.keys(data.schedule).length > 0){
        setSchedule(data.schedule);
        if(typeof data.year==="number") { setYear(data.year); setMonth(data.month); setAnchor(new Date(data.year, data.month, 1)); }
        if(data.lockedDates) setLockedDates(new Set(data.lockedDates));
        setScreen("calendar");
      } else {
        if(typeof data.year==="number") { setYear(data.year); setMonth(data.month); }
      }
    } catch(e){ console.warn("복원 실패:", e); }
  }, []);

                <div className="sum-item"><b>{year}년 {month+1}월</b><span>배정 기간</span></div>
                <div className="sum-item"><b>{doctors.length}명</b><span>의사 수</span></div>
                <div className="sum-item"><b>슬롯당 2명</b><span>최소 인원</span></div>
                <div className="sum-item"><b>{constraints.length}건</b><span>고정 제약</span></div>
              </div>
            </div>

            <div className="load-section">
              <button className="load-file-btn" onClick={()=>fileInputRef.current?.click()}>
                📂 저장된 시간표 불러오기
              </button>
              <input ref={fileInputRef} type="file" accept=".json" style={{display:"none"}}
                onChange={e=>{loadProject(e.target.files?.[0]);e.target.value="";}}/>
              {loadError&&<div className="load-error" style={{marginTop:8}}>⚠️ {loadError}</div>}
            </div>
            <button className="generate-btn" onClick={generate} disabled={doctors.length<2}>
              ✨ 시간표 자동 생성
            </button>
            <p className="gen-note">목표 근무 횟수와 제약 조건에 맞게 즉시 최적 배정합니다</p>
            <p className="gen-note" style={{marginTop:4}}>
              <button className="clear-storage-btn" onClick={()=>{
                if(window.confirm("저장된 모든 데이터를 초기화할까요?")) {
                  localStorage.removeItem(LS_KEY);
                  window.location.reload();
                }
              }}>🗑 저장 데이터 초기화</button>
            </p>
          </div>
      }

      {/* 제약 편집 모달 */}
      {showConst&&editConst&&(
        <div className="overlay" onClick={()=>{setShowConst(false);setEditConst(null);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modalhead">
              <div><div className="meyebrow">제약 설정</div><h2>{editConst.id?"제약 수정":"새 제약 추가"}</h2></div>
              <button className="x" onClick={()=>{setShowConst(false);setEditConst(null);}}>✕</button>
            </div>
            <div className="modalbody">
              <div className="field">
                <label className="field-label">의사 선택</label>
                <div className="doc-chips-select">
                  {doctors.map(d=>(
                    <button key={d.id} className={`doc-sel-btn ${editConst.doctor===d.name?"on":""}`}
                      style={editConst.doctor===d.name?{background:d.bg,color:d.text,borderColor:d.dot}:{}}
                      onClick={()=>setEditConst(p=>({...p,doctor:d.name}))}>
                      <span className="dot" style={{background:d.dot}}/>{d.name}
                    </button>
                  ))}
                </div>
              </div>
              <div className="field">
                <label className="field-label">제약 유형</label>
                <div className="type-grid">
                  {CONSTRAINT_TYPES.map(t=>(
                    <button key={t.value}
                      className={`type-btn ${editConst.type===t.value?"on":""} ${t.value==="no_split"?"type-nosplit":t.value.startsWith("work")?"type-work":"type-off"}`}
                      onClick={()=>setEditConst(p=>({...p,type:t.value,slots:[]}))}>
                      <span className={`type-icon ${t.value==="no_split"?"nosplit":t.value.startsWith("work")?"work":"off"}`}>
                        {t.value==="no_split"?"⛔":t.value.startsWith("work")?"✓":"✕"}
                      </span>
                      <span className="type-text">
                        <b>{t.label}</b>
                        <small>{t.desc}</small>
                      </span>
                    </button>
                  ))}
                </div>
              </div>
              {(editConst.type==="work_weekday"||editConst.type==="off_weekday")&&editConst.type!=="no_split"&&(
                <div className="field">
                  <label className="field-label">요일 선택</label>
                  <div className="wd-row">
                    {[1,2,3,4,5,6].map(n=>(
                      <button key={n}
                        className={`wd-btn ${editConst.weekday===String(n)?"on":""} ${n===6?"sat":""}`}
                        onClick={()=>setEditConst(p=>({...p,weekday:String(n)}))}>
                        {WD_KR[n]}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {(editConst.type==="work_date"||editConst.type==="off_date")&&(
                <div className="field">
                  <label className="field-label">날짜 선택</label>
                  <input type="date" className="input date-input"
                    value={editConst.date}
                    min={`${year}-${pad(month+1)}-01`}
                    max={`${year}-${pad(month+1)}-${new Date(year,month+1,0).getDate()}`}
                    onChange={e=>setEditConst(p=>({...p,date:e.target.value}))}/>
                </div>
              )}
              {(editConst.type==="work_weekday"||editConst.type==="work_date")&&editConst.type!=="no_split"&&(
                <div className="field">
                  <label className="field-label">근무 슬롯 <small style={{color:"#9AA4AD"}}>(미선택 시 전체)</small></label>
                  <div className="slot-row">
                    {["am","pm","sat"].map(s=>{
                      const isSatDay=(editConst.type==="work_weekday"&&editConst.weekday==="6")
                        ||(editConst.type==="work_date"&&new Date(editConst.date).getDay()===6);
                      if(s==="sat"&&!isSatDay) return null;
                      if((s==="am"||s==="pm")&&isSatDay) return null;
                      const on=(editConst.slots||[]).includes(s);
                      return(
                        <button key={s} className={`slot-btn ${on?"on":""}`}
                          onClick={()=>setEditConst(p=>{
                            const arr=p.slots?[...p.slots]:[];
                            const i=arr.indexOf(s);
                            if(i>=0)arr.splice(i,1);else arr.push(s);
                            return {...p,slots:arr};
                          })}>
                          {SLOT_TAG[s]} <small>{SLOT_TIME[s]}</small>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
            <div className="modalfoot"><button className="primary" onClick={saveConst}>저장</button></div>
          </div>
        </div>
      )}
    </div>
  );

  /* ================================================================ CALENDAR ================================================================ */
  const cells=monthCells(anchor.getFullYear(),anchor.getMonth());
  const weekDays=(()=>{
    const s=weekStart(anchor);
    return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});
  })();
  const calTitle=view==="month"
    ?`${anchor.getFullYear()}년 ${anchor.getMonth()+1}월`
    :(()=>{const s=weekDays[0],e=weekDays[6];return `${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;})();
  const shift=dir=>{
    setAnchor(a=>{const d=new Date(a);
      if(view==="month")d.setMonth(d.getMonth()+dir,1);
      else d.setDate(d.getDate()+dir*7);
      return d;});
  };

  return (
    <div className="app"><style>{CSS}</style>
      <header className="header">
        <div className="titleblock">
          <div className="eyebrow">원장님 진료 시간표 · {year}년 {month+1}월</div>
          <h1>근무 배정표</h1>
        </div>
        <div className="stat-row">
          {doctors.map(d=>{
            const c=counts[d.name]||{am:0,pm:0,sat:0,total:0};
            const target=Math.round(d.weeklySlots*(monthDates(year,month).filter(x=>x.getDay()>=1&&x.getDay()<=5).length/5))+d.monthlySats;
            return(
              <div key={d.id} className="stat-card" style={{borderTop:`3px solid ${d.dot}`}}>
                <div className="stat-name" style={{color:d.text}}>{d.name}</div>
                <div className="stat-nums">
                  <span>오전 {c.am}</span><span>오후 {c.pm}</span>
                  <span style={{color:"#3B6EA5"}}>토 {c.sat}</span>
                  {c.hol>0&&<span style={{color:"#C9503E"}}>공휴 {c.hol}</span>}
                </div>
                <div className="stat-bar-wrap">
                  <div className="stat-bar" style={{width:`${Math.min(100,c.total/Math.max(1,target)*100)}%`,background:d.dot}}/>
                </div>
                <div className="stat-total">총 {c.total}회 / 목표 ~{target}회</div>
              </div>
            );
          })}
        </div>
        {constraints.length>0&&(
          <div className="active-const-bar">
            <span className="acb-label">📌 적용된 고정 제약</span>
            {constraints.map(c=>(
              <span key={c.id} className={`acb-chip ${constTag(c)}`}>{constLabel(c)}</span>
            ))}
          </div>
        )}
      </header>

      <div className="toolbar">
        <div className="navgroup">
          <button className="navbtn" onClick={()=>shift(-1)}>‹</button>
          <div className="navlabel">{calTitle}</div>
          <button className="navbtn" onClick={()=>shift(1)}>›</button>
        </div>
        <div className="toggle">
          <button className={`togglebtn ${view==="month"?"on":""}`} onClick={()=>setView("month")}>월간</button>
          <button className={`togglebtn ${view==="week"?"on":""}`} onClick={()=>setView("week")}>주간</button>
        </div>
        <div className="actions">
          <button className="ghost" onClick={()=>setScreen("setup")}>← 재설정</button>
          <button className="ghost" onClick={generate}>↻ 재생성</button>
          {lockedDates.size>0&&<button className="ghost lock-clear" onClick={()=>setLockedDates(new Set())} title="모든 잠금 해제">🔒 {lockedDates.size}개 잠금 해제</button>}
          <span className="autosave-badge" title="변경사항이 브라우저에 자동 저장됩니다">✓ 자동저장</span>
          <button className="ghost save-btn" onClick={saveProject} title="시간표 전체를 JSON 파일로 저장">💾 파일저장</button>
          <button className="ghost load-btn" onClick={()=>fileInputRef.current?.click()} title="저장된 JSON 파일 불러오기">📂 불러오기</button>
          <input ref={fileInputRef} type="file" accept=".json" style={{display:"none"}}
            onChange={e=>{loadProject(e.target.files?.[0]);e.target.value="";}}/>
          <button className="ghost" onClick={exportCSV}>CSV</button>
          <button className="ghost" onClick={()=>window.print()}>인쇄</button>
        </div>
      </div>

      {loadError&&<div className="load-error">⚠️ {loadError}</div>}
      <div className="legend-bar">
        {doctors.map(d=>(
          <span key={d.id} className="legendchip" style={{background:d.bg,color:d.text}}>
            <span className="dot" style={{background:d.dot}}/>{d.name}
            {d.slotFixed&&<span className="slot-badge">{d.slotFixed==="am"?"오전전담":"오후전담"}</span>}
          </span>
        ))}
        <span className="hint-txt">날짜 클릭 → 수동 수정</span>
      </div>

      <div className="scrollx">
        {view==="month"
          ?<MonthView cells={cells} month0={anchor.getMonth()} schedule={schedule} Chip={Chip} onPick={setEditDate} constraints={constraints} lockedDates={lockedDates} toggleLock={toggleLock} leaves={leaves}/>
          :<WeekView days={weekDays} schedule={schedule} Chip={Chip} onPick={setEditDate}/>
        }
      </div>

      <footer className="footer">
        <div className="footer-top">
          <span className="ftitle">진료시간 안내</span>
          <span className="finfo"><b>평일</b> 10:00 ~ 21:00</span>
          <span className="finfo sat"><b>토요일</b> 10:00 ~ 17:00</span>
          <span className="finfo sun"><b>공휴일</b> 10:00 ~ 16:00</span>
        </div>
        <div className="footer-rule">
          <span className="rule-title">📋 배정 원칙</span>
          <span className="rule-item">· 1일 포함 주 월요일부터 5주(35일)간 배정 · 평일 오전·오후 슬롯당 2명</span>
          <span className="rule-item">· 추석 당일·설날 당일·크리스마스·신정은 병원 휴무 자동 적용</span>
          <span className="rule-item">· 토요일 슬롯 2명 배정, 인원 부족 시 <b>{doctors[0]?.name}</b>이(가) 우선 채움</span>
          <span className="rule-item">· 오전·오후 전담 설정은 평일에만 적용 (토요일·공휴일 무관)
          <span className="rule-item">· 공휴일은 1타임 2명 배정 (토요일과 동일 방식)</span></span>
          <span className="rule-item">· 오전·오후 연속 근무 금지 제약 적용 시 같은 날 한 슬롯만 배정</span>
        </div>
      </footer>

      {editDate&&(
        <Editor dt={editDate} schedule={schedule} doctors={doctors}
          toggleDoctor={toggleDoctor} setClosed={setClosed} onClose={()=>setEditDate(null)}/>
      )}
    </div>
  );
}

/* ---------- constraint pin indicators ---------- */
function constraintPins(dt,constraints){
  const k=keyOf(dt),wd=String(dt.getDay());
  return constraints.filter(c=>
    ((c.type==="work_weekday"||c.type==="off_weekday")&&c.weekday===wd)||
    ((c.type==="work_date"||c.type==="off_date")&&c.date===k)
  );
}

function MonthView({cells,month0,schedule,Chip,onPick,constraints,lockedDates,toggleLock,leaves}){
  return(
    <div className="monthgrid">
      {["월","화","수","목","금","토","일"].map((w,i)=>(
        <div key={w} className={`wdhead ${i===5?"sat":""} ${i===6?"sun":""}`}>{w}</div>
      ))}
      {cells.map(dt=>{
        const inMonth=dt.getMonth()===month0,e=schedule[keyOf(dt)]||{},wd=dt.getDay();
        const pins=constraintPins(dt,constraints);
        return(
          <button key={keyOf(dt)} className={`daycell ${inMonth?"":"out"} ${e.closed?"closedcell":""} ${lockedDates.has(keyOf(dt))?"locked":""}`} onClick={()=>onPick(dt)}>
            <div className="dayrow">
              <span className={`daynum ${wd===6?"sat":""} ${wd===0?"sun":""}`}>{dt.getDate()}</span>
              {pins.length>0&&<div className="pin-row">{pins.map(p=>(
                <span key={p.id} className="pin" title={constLabelShort(p)}>
                  {p.type.startsWith("work")?"📌":"🚫"}
                </span>
              ))}</div>}
              {(()=>{
                const k=keyOf(dt);
                const onLeave=leaves.filter(lv=>{
                  const s=new Date(lv.startDate),e=new Date(lv.endDate);
                  return dt>=s&&dt<=e;
                });
                if(!onLeave.length) return null;
                return <div className="leave-pins">{onLeave.map(lv=>(
                  <span key={lv.id} className="leave-pin" title={`${lv.doctor} 연차`}>🏖 {lv.doctor}</span>
                ))}</div>;
              })()}
              {!e.closed&&Object.keys(e).length>0&&(
                <label className="lock-label" onClick={ev=>ev.stopPropagation()} title="재생성 시 이 날짜 유지">
                  <input type="checkbox"
                    checked={lockedDates.has(keyOf(dt))}
                    onChange={ev=>{ev.stopPropagation();toggleLock(dt);}}
                    className="lock-checkbox"/>
                  <span className={`lock-icon ${lockedDates.has(keyOf(dt))?"on":""}`}>🔒</span>
                </label>
              )}
            </div>
            {e.closed?<span className={`closedtag ${e.clinicClosed?"clinic":""}`}>{e.clinicClosed?(KR_HOLIDAYS[keyOf(dt)]||"병원휴무"):"휴무"}</span>
              :<div className="slots">
                {e.holiday&&<span className="holidaytag">{KR_HOLIDAYS[keyOf(dt)]||"공휴일"}</span>}
                {["sat","am","pm"].map(s=>e[s]&&s!=="holiday"&&(
                  <div className="slotrow" key={s}>
                    <span className="slotlabel">{e.holiday?"진료":SLOT_TAG[s]}</span>
                    <div className="chips">{e[s].length?e[s].map(n=><Chip key={n} name={n}/>):<span className="empty">미배정</span>}</div>
                  </div>
                ))}
              </div>
            }
          </button>
        );
      })}
    </div>
  );
}
function constLabelShort(c){
  if(c.type==="no_split") return `${c.doctor} 연속 근무 금지`;
  const tag=c.type.startsWith("work")?"고정 근무":"고정 휴무";
  return `${c.doctor} ${tag}`;
}

function WeekView({days,schedule,Chip,onPick}){
  return(
    <div className="weekgrid">
      <div className="wcell whead corner" style={{gridColumn:1,gridRow:1}}>진료시간</div>
      <div className="wcell timelabel" style={{gridColumn:1,gridRow:2}}>10:00<br/>~ 16:00</div>
      <div className="wcell timelabel" style={{gridColumn:1,gridRow:3}}>16:00<br/>~ 21:00</div>
      {days.map((dt,i)=>{
        const col=i+2,wd=dt.getDay(),e=schedule[keyOf(dt)]||{};
        const head=(<div key={`h${i}`} className={`wcell whead ${wd===6?"sat":""} ${wd===0?"sun":""}`}
          style={{gridColumn:col,gridRow:1}}>{dt.getMonth()+1}/{dt.getDate()} ({WD_KR[wd]})</div>);
        const cellC=slot=>(<div className="chips wk" onClick={()=>onPick(dt)} role="button" tabIndex={0}>
          {(e[slot]||[]).length?e[slot].map(n=><Chip key={n} name={n}/>):<span className="empty">미배정</span>}
        </div>);
        let body;
        if(e.closed){body=(<div key={`b${i}`} className="wcell merged closedcell"
          style={{gridColumn:col,gridRow:"2 / span 2"}} onClick={()=>onPick(dt)}><span className="closedtag">휴무</span></div>);}
        else if(e.sat){body=(<div key={`b${i}`} className="wcell merged" style={{gridColumn:col,gridRow:"2 / span 2"}}>{cellC("sat")}</div>);}
        else{body=[
          <div key={`am${i}`} className="wcell" style={{gridColumn:col,gridRow:2}}>{cellC("am")}</div>,
          <div key={`pm${i}`} className="wcell" style={{gridColumn:col,gridRow:3}}>{cellC("pm")}</div>,
        ];}
        return <>{head}{body}</>;
      })}
    </div>
  );
}

function Editor({dt,schedule,doctors,toggleDoctor,setClosed,onClose}){
  const e=schedule[keyOf(dt)]||{};
  const isHoliday=!!(e&&e.holiday);
  const slots=dt.getDay()===6||isHoliday?["sat"]:["am","pm"];
  const closed=!!e.closed;
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={ev=>ev.stopPropagation()}>
        <div className="modalhead">
          <div><div className="meyebrow">근무 수정</div>
            <h2>{dt.getMonth()+1}월 {dt.getDate()}일 ({WD_KR[dt.getDay()]}){isHoliday&&<span style={{fontSize:"12px",background:"#FBDBD7",color:"#9C3A2E",borderRadius:"6px",padding:"2px 7px",marginLeft:"8px",fontWeight:800}}>{KR_HOLIDAYS[keyOf(dt)]||"공휴일"}</span>}</h2>
          </div>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="modalbody">
          <label className="closedtoggle">
            <input type="checkbox" checked={closed} onChange={ev=>setClosed(dt,ev.target.checked)}/>
            <span>휴무 처리</span>
          </label>
          {!closed&&slots.map(s=>{
            const assigned=e[s]||[];
            return(
              <div className="editslot" key={s}>
                <div className="editslothead">
                  <span className="stag">{isHoliday?"진료":SLOT_TAG[s]}</span>
                  <span className="stime">{isHoliday?SLOT_TIME["sat"]:SLOT_TIME[s]}</span>
                  <span className="scnt">{assigned.length}/2명</span>
                </div>
                <div className="docgrid">
                  {doctors.map(d=>{
                    const on=assigned.includes(d.name);
                    return(
                      <button key={d.id} className={`docbtn ${on?"on":""}`}
                        style={on?{background:d.bg,color:d.text,borderColor:d.dot}:undefined}
                        onClick={()=>toggleDoctor(dt,s,d.name)}>
                        <span className="dot" style={{background:d.dot}}/>{d.name}
                        {on&&<span className="check">✓</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="modalfoot"><button className="primary" onClick={onClose}>완료</button></div>
      </div>
    </div>
  );
}

const CSS=`
:root{
  --bg:#EDF0F3;--card:#fff;--line:#E2E6EA;--line2:#EDF0F2;
  --ink:#1E2A35;--ink2:#5C6873;--accent:#3B6EA5;--sat:#3B6EA5;--sun:#C9503E;
  --work:#2F8F7F;--off:#C9503E;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
/* setup */
.setup-wrap{max-width:640px;margin:0 auto;padding:32px 20px 48px;}
.setup-hero{text-align:center;margin-bottom:28px;}
.hero-icon{font-size:44px;margin-bottom:10px;}
.setup-hero h1{font-size:26px;font-weight:900;letter-spacing:-.02em;}
.hero-sub{color:var(--ink2);font-size:14px;margin-top:7px;}
.section-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:14px;}
.section-label{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent);margin-bottom:14px;}
.section-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.add-const-btn{border:1.5px dashed var(--accent);background:#EEF4FA;color:var(--accent);
  border-radius:9px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.add-const-btn:hover{background:#E2EEF9;}
.month-row{display:flex;align-items:center;gap:8px;}
.sel{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:15px;
  font-weight:700;background:#fff;color:var(--ink);cursor:pointer;}
.sel-sep{font-size:15px;font-weight:700;color:var(--ink2);}
.doc-card{background:#F7F9FB;border-radius:10px;margin-bottom:10px;
  padding:12px 14px;border-left:3px solid transparent;}
.doc-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.doc-card-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;}
.doc-ctrl-item{display:flex;flex-direction:column;gap:5px;}
.ctrl-label{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;}
/* 이름 편집 */
.doc-name-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;
  padding:4px 6px;border-radius:7px;transition:background .1s;}
.doc-name-btn:hover{background:#EDF0F3;}
.doc-name{font-size:15px;font-weight:800;}
.edit-icon{font-size:12px;opacity:0;transition:opacity .15s;}
.doc-name-btn:hover .edit-icon{opacity:1;}
.name-inline{width:100%;border:1.5px solid var(--accent);border-radius:8px;
  padding:6px 10px;font-size:14px;font-weight:700;background:#EEF4FA;color:var(--ink);}
.name-inline:focus{outline:none;}
.stepper{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
  border-radius:9px;padding:4px 8px;}
.stepper button{border:none;background:none;width:22px;height:22px;border-radius:6px;
  font-size:17px;line-height:1;color:var(--ink2);cursor:pointer;font-weight:700;}
.stepper button:hover{background:#EAEEF2;}
.stepper span{font-size:14px;font-weight:800;min-width:48px;text-align:center;}
.stepper small{font-size:11px;font-weight:600;color:var(--ink2);margin-left:1px;}
.remove-btn{border:1px solid #F5CECA;background:#FEF7F6;color:#C9503E;border-radius:8px;
  padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;}
.remove-btn:hover{background:#FBEDEB;}
.add-row{display:grid;grid-template-columns:1fr 130px 130px 80px;gap:8px;margin-top:12px;
  padding-top:12px;border-top:1px dashed var(--line2);}
.input{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);}
.input:focus{outline:none;border-color:var(--accent);}
.name-input{width:100%;}
.add-btn{border:1.5px dashed var(--accent);background:#EEF4FA;color:var(--accent);
  border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
.add-btn:hover{background:#E2EEF9;}
/* slot fixed toggle */
.slot-fixed-toggle{display:flex;gap:4px;}
.sft-btn{border:1.5px solid var(--line);background:#fff;border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;
  transition:border-color .1s,background .1s;}
.sft-btn:hover{border-color:#CBD5DF;}
.sft-btn.on{font-weight:800;}
.sft-btn.on[style]{} /* color applied inline */
/* constraints */
.empty-const{font-size:13px;color:#9AA4AD;padding:10px 0 4px;}
.const-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.const-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-radius:10px;border:1px solid var(--line);}
.const-row.const-work{background:#F0FAF7;border-color:#B8E4DB;}
.const-row.const-off{background:#FEF4F2;border-color:#F5CECA;}
.const-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.const-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.const-badge.work{background:#D0F0EA;color:#1B7A68;}
.const-badge.off{background:#FBDBD7;color:#9C3A2E;}
.const-row.const-nosplit{background:#F4F0FB;border-color:#C9B8E8;}
.const-badge.nosplit{background:#E5D8F8;color:#5B3FA6;}
.const-desc{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.const-actions{display:flex;gap:6px;flex:none;margin-left:10px;}
.const-edit{border:1px solid var(--line);background:#fff;border-radius:7px;
  padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink2);}
.const-edit:hover{background:#F3F6F9;}
.const-del{border:1px solid #F5CECA;background:#FEF7F6;color:#C9503E;border-radius:7px;
  padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;}
.const-del:hover{background:#FBEDEB;}
/* summary */
.summary-card{background:linear-gradient(135deg,#EEF4FA,#F0F7F4);border:1px solid #D4E4F0;
  border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;}
.sum-title{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sum-item{text-align:center;}
.sum-item b{display:block;font-size:16px;font-weight:900;color:var(--ink);}
.sum-item span{font-size:11.5px;color:var(--ink2);}
.generate-btn{width:100%;border:none;
  background:linear-gradient(135deg,#3B6EA5,#2F8F7F);
  color:#fff;border-radius:13px;padding:17px;font-size:17px;font-weight:800;
  cursor:pointer;box-shadow:0 6px 20px rgba(59,110,165,.30);
  transition:transform .1s,box-shadow .1s;}
.generate-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 9px 28px rgba(59,110,165,.38);}
.generate-btn:active:not(:disabled){transform:translateY(0);}
.generate-btn:disabled{opacity:.45;cursor:not-allowed;}
.gen-note{text-align:center;font-size:12.5px;color:var(--ink2);margin-top:11px;}
.load-section{margin-bottom:12px;}
.autosave-badge{font-size:12px;font-weight:700;color:#2F8F7F;background:#F0FAF7;
  border:1px solid #B8E4DB;border-radius:8px;padding:6px 10px;white-space:nowrap;}
.clear-storage-btn{background:none;border:none;color:#9AA4AD;font-size:12px;
  cursor:pointer;text-decoration:underline;padding:0;}
.clear-storage-btn:hover{color:var(--sun);}
.load-file-btn{width:100%;border:1.5px dashed #2F8F7F;background:#F0FAF7;color:#2F8F7F;
  border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.load-file-btn:hover{background:#E0F5F0;}
.load-error{background:#FEF0EE;border:1px solid #F5CECA;border-radius:10px;
  padding:10px 14px;color:#9C3A2E;font-size:13px;font-weight:600;margin:0 20px;}
.save-btn{color:#2C5282;border-color:#BFD0E2;}
.save-btn:hover{background:#EEF4FA;}
.load-btn{color:#246B5C;border-color:#B8E4DB;}
.load-btn:hover{background:#F0FAF7;}
.holiday-hint{font-size:12px;color:var(--ink2);}
.holiday-add-row{display:flex;gap:8px;margin-bottom:10px;}
.add-holiday-btn{border:1.5px dashed var(--sun);background:#FEF7F6;color:var(--sun);
  border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.add-holiday-btn:hover{background:#FBEDEB;}
.holiday-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.holiday-chip{display:inline-flex;align-items:center;gap:7px;background:#FEF4F2;
  border:1px solid #F5CECA;border-radius:8px;padding:5px 10px;font-size:13px;font-weight:600;color:var(--sun);}
.holiday-del{border:none;background:none;color:#C9503E;cursor:pointer;font-size:13px;padding:0;}
.holiday-chip.kr{background:#FFF3E0;border-color:#FFCC80;color:#E65100;cursor:default;}
.kr-hol-label{font-size:11px;font-weight:800;color:var(--ink2);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:6px;}
.holiday-del:hover{opacity:.7;}
/* 연차 */
.leave-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.leave-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-radius:10px;background:#F7F9FB;
  border:1px solid var(--line);border-left:3px solid var(--line);}
.leave-info{display:flex;flex-direction:column;gap:3px;}
.leave-name{font-size:14px;font-weight:800;}
.leave-period{font-size:12.5px;color:var(--ink2);}
.leave-add-form{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line2);display:flex;flex-direction:column;gap:10px;}
.leave-add-row{display:flex;gap:8px;}
.leave-sel{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;
  font-size:14px;font-weight:600;background:#fff;color:var(--ink);}
.leave-date-row{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;}
.leave-date-item{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.leave-date-label{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;}
.leave-tilde{font-size:18px;font-weight:700;color:var(--ink2);padding-bottom:8px;}
.add-leave-btn{border:1.5px dashed #2F8F7F;background:#F0FAF7;color:#2F8F7F;
  border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.add-leave-btn:hover{background:#E0F5F0;}
.holidaytag{align-self:flex-start;background:#FBDBD7;color:#9C3A2E;font-size:11px;font-weight:800;
  padding:2px 8px;border-radius:6px;margin-bottom:3px;}
/* loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:16px;padding:24px;}
.spinner-ring{width:52px;height:52px;border:4px solid #D9E6F2;border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap h2{font-size:21px;font-weight:800;}
.loading-wrap p{color:var(--ink2);font-size:14px;}
/* constraint modal */
.field{margin-bottom:16px;}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--ink2);
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.doc-chips-select{display:flex;flex-wrap:wrap;gap:8px;}
.doc-sel-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);
  background:#fff;border-radius:10px;padding:8px 14px;font-size:13.5px;font-weight:600;
  color:var(--ink2);cursor:pointer;}
.doc-sel-btn:hover{border-color:#CBD5DF;}
.doc-sel-btn.on{font-weight:800;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.type-btn{display:flex;align-items:flex-start;gap:10px;border:1.5px solid var(--line);
  background:#fff;border-radius:11px;padding:11px 13px;cursor:pointer;text-align:left;}
.type-btn:hover{border-color:#CBD5DF;background:#F9FAFB;}
.type-btn.on.type-work{border-color:var(--work);background:#F0FAF7;}
.type-btn.on.type-off{border-color:var(--off);background:#FEF4F2;}
.type-btn.on.type-nosplit{border-color:#7C5CBF;background:#F4F0FB;}
.type-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex:none;margin-top:1px;}
.type-icon.work{background:#D0F0EA;color:#1B7A68;}
.type-icon.off{background:#FBDBD7;color:#9C3A2E;}
.type-icon.nosplit{background:#E5D8F8;color:#5B3FA6;}
.type-text{display:flex;flex-direction:column;gap:2px;}
.type-text b{font-size:13px;font-weight:800;color:var(--ink);}
.type-text small{font-size:11.5px;color:var(--ink2);line-height:1.4;}
.wd-row{display:flex;gap:8px;}
.wd-btn{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;font-size:15px;font-weight:700;color:var(--ink2);cursor:pointer;}
.wd-btn:hover{border-color:#CBD5DF;}
.wd-btn.on{border-color:var(--accent);background:#EEF4FA;color:var(--accent);}
.wd-btn.sat.on{border-color:var(--sat);color:var(--sat);}
.date-input{width:100%;}
.slot-row{display:flex;gap:8px;flex-wrap:wrap;}
.slot-btn{border:1.5px solid var(--line);background:#fff;border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;}
.slot-btn:hover{border-color:#CBD5DF;}
.slot-btn.on{border-color:var(--work);background:#F0FAF7;color:var(--work);font-weight:800;}
.slot-btn small{font-size:11px;color:inherit;margin-left:4px;}
/* calendar header */
.app > .header{padding:20px 20px 0;}
.header{display:flex;flex-direction:column;gap:12px;}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700;}
.titleblock h1{font-size:24px;font-weight:900;letter-spacing:-.02em;margin-top:3px;}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:11px;
  padding:11px 14px 10px;min-width:130px;flex:1;}
.stat-name{font-size:13.5px;font-weight:800;margin-bottom:5px;}
.stat-nums{display:flex;gap:8px;font-size:12px;color:var(--ink2);margin-bottom:6px;}
.stat-bar-wrap{height:4px;background:#EAEEF2;border-radius:99px;overflow:hidden;margin-bottom:5px;}
.stat-bar{height:100%;border-radius:99px;transition:width .4s;}
.stat-total{font-size:12px;font-weight:700;color:var(--ink2);}
.active-const-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:#FFFBF0;border:1px solid #F0DC9A;border-radius:11px;padding:9px 14px;}
.acb-label{font-size:12px;font-weight:800;color:#8A5A12;white-space:nowrap;}
.acb-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;}
.acb-chip.work{background:#D0F0EA;color:#1B7A68;}
.acb-chip.off{background:#FBDBD7;color:#9C3A2E;}
.acb-chip.nosplit{background:#E5D8F8;color:#5B3FA6;}
/* toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 14px;margin:14px 20px 10px;}
.navgroup{display:flex;align-items:center;gap:6px;}
.navbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;
  font-size:19px;line-height:1;color:var(--ink);cursor:pointer;}
.navbtn:hover{background:#F3F6F9;}
.navlabel{font-size:17px;font-weight:800;min-width:148px;text-align:center;}
.toggle{display:flex;background:#EBEFF3;border-radius:10px;padding:3px;gap:2px;}
.togglebtn{border:none;background:transparent;padding:7px 18px;border-radius:8px;
  font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;}
.togglebtn.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,40,60,.12);}
.actions{display:flex;gap:7px;flex-wrap:wrap;}
.ghost{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;
  font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;}
.ghost:hover{background:#F3F6F9;}
.legend-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 20px 10px;}
.legendchip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;
  border-radius:999px;font-size:13px;font-weight:600;}
.hint-txt{font-size:12px;color:#9AA4AD;margin-left:auto;}
.slot-badge{font-size:10px;font-weight:800;padding:1px 6px;border-radius:99px;
  background:rgba(0,0,0,.08);margin-left:2px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 20px 4px;}
/* month */
.monthgrid{display:grid;grid-template-columns:repeat(7,minmax(132px,1fr));gap:7px;min-width:940px;}
.wdhead{font-size:12px;font-weight:700;color:var(--ink2);text-align:center;padding:4px 0 2px;}
.wdhead.sat{color:var(--sat);}.wdhead.sun{color:var(--sun);}
.daycell{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;
  min-height:124px;padding:9px;cursor:pointer;display:flex;flex-direction:column;
  transition:box-shadow .12s,border-color .12s,transform .06s;}
.daycell:hover{border-color:#BFD0E2;box-shadow:0 4px 14px rgba(40,70,110,.10);}
.daycell:active{transform:translateY(1px);}
.daycell.out{background:#F6F8F9;opacity:.6;}
.daycell.locked{border:2px solid #F0B429;background:#FFFBF0;}
.daycell.locked:hover{border-color:#E6A817;}
.lock-label{margin-left:auto;display:flex;align-items:center;gap:3px;cursor:pointer;
  padding:2px 4px;border-radius:6px;transition:background .1s;}
.lock-label:hover{background:rgba(0,0,0,.06);}
.lock-checkbox{width:13px;height:13px;accent-color:#F0B429;cursor:pointer;
  opacity:0;transition:opacity .15s;}
.daycell:hover .lock-checkbox{opacity:1;}
.lock-checkbox:checked{opacity:1;}
.lock-icon{font-size:12px;opacity:0;transition:opacity .15s;}
.daycell:hover .lock-icon{opacity:.4;}
.lock-icon.on{opacity:1;}
.lock-clear{border-color:#F0B429;color:#8A6000;background:#FFFBF0;}
.lock-clear:hover{background:#FFF3CC;}
.daycell.closedcell{background:repeating-linear-gradient(135deg,#F7F8FA,#F7F8FA 7px,#F1F3F5 7px,#F1F3F5 14px);}
.dayrow{display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.daynum{font-size:14px;font-weight:800;color:var(--ink);}
.daynum.sat{color:var(--sat);}.daynum.sun{color:var(--sun);}
.pin-row{display:flex;gap:2px;}.pin{font-size:12px;line-height:1;}
.leave-pins{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.leave-pin{font-size:10px;font-weight:700;background:#E0F5F0;color:#1B7A68;
  border-radius:5px;padding:1px 5px;}
.slots{display:flex;flex-direction:column;gap:6px;}
.slotrow{display:flex;flex-direction:column;gap:3px;}
.slotlabel{font-size:10px;font-weight:700;letter-spacing:.04em;color:#97A2AC;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:7px;font-weight:600;}
.chip.sm{padding:3px 8px;font-size:12px;}
.empty{font-size:11.5px;color:#AAB3BC;}
.closedtag{align-self:flex-start;background:#EAEDF0;color:#8A95A0;font-size:12px;font-weight:700;
  padding:4px 11px;border-radius:7px;margin-top:2px;}
.closedtag.clinic{background:#FBE9E7;color:#C9503E;}
/* week */
.weekgrid{display:grid;grid-template-columns:90px repeat(7,minmax(130px,1fr));
  grid-template-rows:auto 1fr 1fr;gap:6px;min-width:1000px;}
.wcell{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:9px;display:flex;align-items:center;justify-content:center;min-height:84px;}
.wcell.whead{min-height:0;padding:9px 6px;font-size:13px;font-weight:700;background:#F4F6F8;}
.wcell.whead.sat{color:var(--sat);}.wcell.whead.sun{color:var(--sun);}
.wcell.corner,.wcell.timelabel{font-size:12px;color:var(--ink2);font-weight:700;background:#F4F6F8;text-align:center;line-height:1.5;}
.wcell.merged{flex-direction:column;}
.wcell .chips.wk{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;width:100%;cursor:pointer;}
.weekgrid .chip{padding:5px 11px;font-size:13px;}
.wcell.closedcell{background:repeating-linear-gradient(135deg,#F7F8FA,#F7F8FA 7px,#F1F3F5 7px,#F1F3F5 14px);cursor:pointer;}
/* footer */
.footer{display:flex;flex-direction:column;gap:10px;margin:16px 20px 24px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;}
.footer-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.ftitle{font-size:13px;font-weight:800;}
.finfo{font-size:13px;color:var(--ink2);}
.finfo b{color:var(--ink);font-weight:700;margin-right:5px;}
.finfo.sat b{color:var(--sat);}.finfo.sun b{color:var(--sun);}
.footer-rule{display:flex;flex-wrap:wrap;gap:6px 16px;padding-top:10px;
  border-top:1px solid var(--line2);}
.rule-title{font-size:11.5px;font-weight:800;color:var(--accent);letter-spacing:.05em;width:100%;}
.rule-item{font-size:12px;color:var(--ink2);}
.rule-item b{color:var(--ink);font-weight:700;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,36,48,.45);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:460px;max-height:90vh;overflow:auto;
  box-shadow:0 24px 60px rgba(20,40,70,.30);}
.modalhead{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 6px;}
.meyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700;}
.modalhead h2{font-size:20px;font-weight:800;margin-top:3px;}
.x{border:none;background:#F0F3F5;width:32px;height:32px;border-radius:9px;font-size:14px;
  color:var(--ink2);cursor:pointer;}
.x:hover{background:#E6EAEE;}
.modalbody{padding:8px 22px 4px;}
.closedtoggle{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;
  padding:11px 13px;border:1px solid var(--line);border-radius:11px;cursor:pointer;margin:8px 0 4px;}
.closedtoggle input{width:17px;height:17px;accent-color:var(--accent);}
.editslot{padding:14px 0 4px;border-top:1px solid var(--line2);margin-top:10px;}
.editslothead{display:flex;align-items:baseline;gap:8px;margin-bottom:9px;}
.stag{font-size:14px;font-weight:800;}.stime{font-size:12.5px;color:var(--ink2);}
.scnt{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent);}
.docgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.docbtn{display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:#fff;
  border-radius:10px;padding:10px 12px;font-size:13.5px;font-weight:600;color:var(--ink2);cursor:pointer;}
.docbtn:hover{border-color:#CBD5DF;}
.docbtn.on{font-weight:800;}
.check{margin-left:auto;font-size:12px;}
.modalfoot{padding:12px 22px 20px;}
.primary{width:100%;border:none;background:var(--accent);color:#fff;border-radius:11px;
  padding:12px;font-size:14.5px;font-weight:700;cursor:pointer;}
.primary:hover{background:#33608F;}
@media(max-width:600px){
  .setup-wrap{padding:20px 14px 36px;}
  .add-row{grid-template-columns:1fr 90px 90px 70px;}
  .type-grid{grid-template-columns:1fr;}
  .sum-grid{grid-template-columns:1fr 1fr;}
  .stat-row{flex-direction:column;}
  .toolbar{flex-direction:column;align-items:flex-start;}
  .actions{width:100%;justify-content:flex-end;}
  .hint-txt{display:none;}
}
@media print{
  .toolbar,.actions,.legend-bar .hint-txt,.overlay,.active-const-bar{display:none !important;}
  .app{background:#fff;}
  .scrollx{overflow:visible;}
  .monthgrid,.weekgrid{min-width:0;}
}
`;

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
